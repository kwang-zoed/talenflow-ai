# 合并到 main 或手动触发：测试通过后构建并推送 Docker Hub，并删除本机（Runner）上的旧 talentflow 镜像
name: Publish Docker Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（默认 latest，可填版本号如 v1.0.0）"
        required: false
        default: latest

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE || secrets.DOCKERHUB_USERNAME || 'kwangzoed' }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
  PYTHON_BASE: docker.io/library/python:3.11-slim-bookworm
  NODE_BASE: docker.io/library/node:18-alpine
  NGINX_BASE: docker.io/library/nginx:stable-alpine

jobs:
  # 与 ci.yml 相同检查，避免 main 直接推送时跳过 PR 检查
  gate:
    name: 发布前检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: talentflow-ai-backend-bak/requirements.txt
      - name: 快速 import 检查
        working-directory: talentflow-ai-backend-bak
        run: |
          pip install -q pydantic pydantic-settings python-dotenv sqlalchemy sqlmodel pymysql
          pip install -q langchain-core langgraph langsmith fastapi httpx
          python check_imports.py

  publish:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: 镜像名
        id: meta
        run: |
          NS="${{ env.DOCKER_NAMESPACE }}"
          REG="${{ env.DOCKER_REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SHA="${{ github.sha }}"
          echo "backend=${REG}/${NS}/talentflow-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REG}/${NS}/talentflow-frontend" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${REG}/${NS}/talentflow-backend:${TAG}"
          echo "${REG}/${NS}/talentflow-backend:${SHA}"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "ftags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${REG}/${NS}/talentflow-frontend:${TAG}"
          echo "${REG}/${NS}/talentflow-frontend:${SHA}"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 推送 backend（含 MCP / Celery 同款）
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.backend }}:${{ github.sha }}
          build-args: |
            PYTHON_BASE=${{ env.PYTHON_BASE }}
          cache-from: type=gha,scope=backend-publish
          cache-to: type=gha,mode=max,scope=backend-publish

      - name: 检查 frontend 目录
        id: frontend
        run: |
          if [ -f talentflow-ai-frontend/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 推送 frontend
        if: steps.frontend.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.frontend }}:${{ github.sha }}
          build-args: |
            NODE_BASE=${{ env.NODE_BASE }}
            NGINX_BASE=${{ env.NGINX_BASE }}
          cache-from: type=gha,scope=frontend-publish
          cache-to: type=gha,mode=max,scope=frontend-publish

      - name: 删除 Runner 上的旧 talentflow 镜像
        run: |
          chmod +x scripts/prune-talentflow-images.sh
          KEEP_TAG="${{ env.IMAGE_TAG }}"
          KEEP_SHA="${{ github.sha }}"
          ./scripts/prune-talentflow-images.sh \
            --registry "${{ env.DOCKER_REGISTRY }}" \
            --namespace "${{ env.DOCKER_NAMESPACE }}" \
            --keep-tags "${KEEP_TAG},${KEEP_SHA}"

      - name: 发布摘要
        run: |
          echo "## 已推送" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.backend }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.backend }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.frontend.outputs.exists }}" = "true" ]; then
            echo "- \`${{ steps.meta.outputs.frontend }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
