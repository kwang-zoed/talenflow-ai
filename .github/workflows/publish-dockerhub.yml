# 合并到 main 或手动触发：CI 通过后构建并推送 Docker Hub
name: Publish Docker Hub

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（默认 latest，可填版本号如 v1.0.0）"
        required: false
        default: latest
      skip_ci_wait:
        description: "保留字段（手动发布仍会跑 gate 检查）"
        required: false
        default: false
        type: boolean
      skip_deploy:
        description: "跳过 SSH 自动部署（仅 workflow_dispatch）"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE || secrets.DOCKERHUB_USERNAME || 'kwangzoed' }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
  PYTHON_BASE: docker.io/library/python:3.11-slim-bookworm
  NODE_BASE: docker.io/library/node:18-alpine
  NGINX_BASE: docker.io/library/nginx:stable-alpine
  SSH_HOST: ${{ vars.SSH_HOST || secrets.SSH_HOST || '8.218.11.250' }}
  SSH_USER: ${{ vars.SSH_USER || secrets.SSH_USER || 'root' }}
  SSH_DEPLOY_PATH: ${{ vars.SSH_DEPLOY_PATH || secrets.SSH_DEPLOY_PATH || '/root/workspace' }}
  DEPLOY_URL: ${{ vars.DEPLOY_URL || secrets.DEPLOY_URL || 'http://8.218.11.250/' }}

jobs:
  gate:
    name: 发布前检查
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - name: 确认 CI 已通过
        if: github.event_name == 'workflow_run'
        run: |
          echo "CI workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::error::CI 未通过，跳过发布"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: talentflow-ai-backend-bak/requirements.txt

      - uses: ./.github/actions/backend-check

  publish:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          submodules: false

      - name: 检查 Docker Hub Secrets 是否生效
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ]; then
            echo "::error::Secret 未生效或为空：名称必须是 DOCKERHUB_USERNAME"
            exit 1
          fi
          if [ -z "$DH_TOKEN" ]; then
            echo "::error::Secret 未生效或为空：名称必须是 DOCKERHUB_TOKEN"
            exit 1
          fi
          echo "Docker Hub 用户名已读取（${#DH_USER} 个字符）"

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 释放 Runner 磁盘
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          df -h

      - uses: docker/setup-buildx-action@v3

      - name: 镜像名
        id: meta
        run: |
          NS="${{ env.DOCKER_NAMESPACE }}"
          REG="${{ env.DOCKER_REGISTRY }}"
          echo "backend=${REG}/${NS}/talentflow-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REG}/${NS}/talentflow-frontend" >> "$GITHUB_OUTPUT"

      - name: 推送 backend（含 MCP / Celery 同款）
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.backend }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.backend }}:${{ github.event.workflow_run.head_sha || github.sha }}
          build-args: |
            PYTHON_BASE=${{ env.PYTHON_BASE }}
            HF_ENDPOINT=https://huggingface.co
          cache-from: type=gha,scope=backend-publish
          cache-to: type=gha,mode=max,scope=backend-publish

      - name: 检查 frontend 目录
        id: frontend
        run: |
          if [ -f talentflow-ai-frontend/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 推送 frontend
        if: steps.frontend.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-frontend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.frontend }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.frontend }}:${{ github.event.workflow_run.head_sha || github.sha }}
          build-args: |
            NODE_BASE=${{ env.NODE_BASE }}
            NGINX_BASE=${{ env.NGINX_BASE }}
          cache-from: type=gha,scope=frontend-publish
          cache-to: type=gha,mode=max,scope=frontend-publish

      - name: 删除 Runner 上的旧 talentflow 镜像
        if: always()
        continue-on-error: true
        run: |
          chmod +x scripts/prune-talentflow-images.sh
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          ./scripts/prune-talentflow-images.sh \
            --namespace "${{ env.DOCKER_NAMESPACE }}" \
            --registry "${{ env.DOCKER_REGISTRY }}" \
            --keep-tags "${{ env.IMAGE_TAG }},${SHA}" || true

      - name: 发布摘要
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "## 已推送" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.backend }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.backend }}:${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.frontend.outputs.exists }}" = "true" ]; then
            echo "- \`${{ steps.meta.outputs.frontend }}:${{ env.IMAGE_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 服务器部署" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "git pull && ./scripts/deploy-server.sh" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ vars.ENABLE_SSH_DEPLOY }}" = "false" ] || [ "${{ secrets.ENABLE_SSH_DEPLOY }}" = "false" ]; then
            echo "SSH 部署已关闭（ENABLE_SSH_DEPLOY=false）" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "SSH 部署：${{ env.DEPLOY_URL }}" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    name: SSH 部署生产服务器
    runs-on: ubuntu-latest
    needs: publish
    # 默认开启；仅手动 skip_deploy 或显式 ENABLE_SSH_DEPLOY=false 时跳过
    if: >
      github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true'
    steps:
      - name: 是否启用 SSH 部署
        id: deploy_gate
        env:
          ENABLE_VAR: ${{ vars.ENABLE_SSH_DEPLOY }}
          ENABLE_SECRET: ${{ secrets.ENABLE_SSH_DEPLOY }}
        run: |
          if [ "$ENABLE_VAR" = "false" ] || [ "$ENABLE_SECRET" = "false" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ENABLE_SSH_DEPLOY=false，跳过 SSH 部署"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "SSH 部署已启用（未设置 ENABLE_SSH_DEPLOY 时默认开启）"
          fi

      - name: 检查 SSH Secret
        id: ssh
        if: steps.deploy_gate.outputs.enabled == 'true'
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::未配置 SSH_PRIVATE_KEY，跳过 SSH 部署。见 docs/DEPLOY_SSH.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "SSH 目标: ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.SSH_DEPLOY_PATH }}"
          fi

      - name: SSH 连通性测试
        if: steps.deploy_gate.outputs.enabled == 'true' && steps.ssh.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          debug: true
          script: |
            echo "=== SSH 连通 OK ==="
            echo "user=$(whoami) host=$(hostname)"
            echo "deploy_path=${{ env.SSH_DEPLOY_PATH }}"
            ls -la "${{ env.SSH_DEPLOY_PATH }}" 2>&1 || echo "目录不存在或不可读"

      - name: 远程 pull 镜像并重启
        if: steps.deploy_gate.outputs.enabled == 'true' && steps.ssh.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          debug: true
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="$(printf '%s' '${{ env.SSH_DEPLOY_PATH }}' | tr -d '\r')"
            REPO="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name || 'master' }}"
            BRANCH="${BRANCH#refs/heads/}"
            if [ -z "${BRANCH}" ] || [ "${BRANCH}" = "null" ]; then
              BRANCH="master"
            fi

            echo "=== 部署开始 $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
            echo "DEPLOY_PATH=${DEPLOY_PATH}"
            echo "REPO=${REPO} BRANCH=${BRANCH}"

            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"
            echo "PWD=$(pwd)"

            if [ ! -f .env ]; then
              echo "错误: 缺少 .env（请先 cp .env.production.example .env 并编辑）"
              ls -la
              exit 1
            fi

            sync_repo() {
              export GIT_TERMINAL_PROMPT=0
              if [ -f scripts/deploy-server.sh ]; then
                echo "scripts/deploy-server.sh 已存在"
                if [ -d .git ]; then
                  echo "尝试 git pull（失败不阻断部署）..."
                  git fetch origin "${BRANCH}" 2>&1 || git fetch --all --prune 2>&1 || true
                  if ! git symbolic-ref -q HEAD >/dev/null 2>&1; then
                    git checkout -B "${BRANCH}" "origin/${BRANCH}" 2>&1 || true
                  fi
                  git pull --ff-only origin "${BRANCH}" 2>&1 || true
                fi
                return 0
              fi

              echo "缺少 deploy 脚本，同步代码..."
              if [ ! -d .git ]; then
                if [ -z "$(ls -A 2>/dev/null | grep -v '^\.env$' || true)" ]; then
                  git clone --depth 1 --branch "${BRANCH}" "${REPO}" .
                else
                  git init
                  git remote add origin "${REPO}" 2>/dev/null || git remote set-url origin "${REPO}"
                  git fetch --depth 1 origin "${BRANCH}"
                  git checkout -f "FETCH_HEAD"
                fi
              else
                git fetch --all --prune
                git checkout -f "origin/${BRANCH}" 2>/dev/null || git checkout -f "FETCH_HEAD" 2>/dev/null || git pull --ff-only origin "${BRANCH}"
              fi
            }

            sync_repo || {
              echo "警告: git 同步失败（私有仓库需在服务器配置 deploy key）"
              echo "若 scripts/deploy-server.sh 仍不存在，请 SSH 登录服务器手动 git pull"
            }

            if [ ! -f scripts/deploy-server.sh ]; then
              echo "错误: scripts/deploy-server.sh 不存在"
              ls -la
              ls -la scripts 2>/dev/null || true
              exit 1
            fi

            find scripts -type f -name '*.sh' -exec sed -i 's/\r$//' {} + 2>/dev/null || true
            chmod +x scripts/deploy-server.sh scripts/bootstrap-db.sh 2>/dev/null || true
            bash scripts/deploy-server.sh

      - name: 健康检查
        if: steps.deploy_gate.outputs.enabled == 'true' && steps.ssh.outputs.configured == 'true'
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --max-time 10 "${{ env.DEPLOY_URL }}" >/dev/null; then
              echo "部署可访问: ${{ env.DEPLOY_URL }}"
              exit 0
            fi
            echo "等待 ${{ env.DEPLOY_URL }} ... ($i/12)"
            sleep 10
          done
          echo "::warning::HTTP 健康检查超时，请登录服务器 docker compose ps 排查"

      - name: 部署摘要
        if: steps.deploy_gate.outputs.enabled == 'true' && steps.ssh.outputs.configured == 'true'
        run: |
          echo "## SSH 部署" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: \`${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.SSH_DEPLOY_PATH }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 访问: ${{ env.DEPLOY_URL }}" >> "$GITHUB_STEP_SUMMARY"
