# 无服务器阶段：每次 PR / push 先在「测试环境」验证能否构建、能否通过静态检查
name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE || secrets.DOCKERHUB_USERNAME || 'kwangzoed' }}
  PYTHON_BASE: docker.io/library/python:3.11-slim-bookworm
  NODE_BASE: docker.io/library/node:18-alpine
  NGINX_BASE: docker.io/library/nginx:stable-alpine

jobs:
  backend-check:
    name: 后端静态检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: talentflow-ai-backend-bak/requirements.txt

      - uses: ./.github/actions/backend-check

  docker-build-verify:
    name: Docker 构建验证（不推送）
    runs-on: ubuntu-latest
    needs: backend-check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: 释放 Runner 磁盘（大模型镜像构建前）
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker system prune -af 2>/dev/null || true
          df -h

      - uses: docker/setup-buildx-action@v3

      - name: 构建 backend 镜像（验证 Dockerfile，不 load 到本机省磁盘）
        uses: docker/build-push-action@v6
        with:
          context: ./talentflow-ai-backend-bak
          file: ./talentflow-ai-backend-bak/Dockerfile
          push: false
          provenance: false
          sbom: false
          tags: talentflow-backend:ci-${{ github.sha }}
          build-args: |
            PYTHON_BASE=${{ env.PYTHON_BASE }}
            HF_ENDPOINT=https://huggingface.co
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 构建 frontend 镜像（若目录存在）
        id: frontend
        run: |
          if [ -f talentflow-ai-frontend/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::未找到 talentflow-ai-frontend/Dockerfile，跳过前端构建"
          fi

      - uses: docker/build-push-action@v6
        if: steps.frontend.outputs.exists == 'true'
        with:
          context: ./talentflow-ai-frontend
          push: false
          provenance: false
          sbom: false
          tags: talentflow-frontend:ci-${{ github.sha }}
          build-args: |
            NODE_BASE=${{ env.NODE_BASE }}
            NGINX_BASE=${{ env.NGINX_BASE }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 清理 buildx 缓存
        if: always()
        run: docker builder prune -af 2>/dev/null || true
