# 生产环境覆盖配置
# 用法：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  mysql:
    ports: !reset []

  redis:
    ports: !reset []

  mcp-server:
    ports: !reset []

  backend:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  celery-worker:
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  frontend:
    ports:
      - "${FRONTEND_PUBLISH_PORT:-80}:80"
