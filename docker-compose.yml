name: talentflow-ai

x-backend-build: &backend-build
  context: ./talentflow-ai-backend-bak
  dockerfile: Dockerfile
  args:
    PYTHON_BASE: ${DOCKER_PYTHON_BASE:-docker.m.daocloud.io/library/python:3.11-slim-bookworm}

services:
  mysql:
    image: ${DOCKER_MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.0}
    container_name: talentflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dandelion_tribe}
      MYSQL_USER: ${MYSQL_USER:-talentflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_db}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-change_me_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: ${DOCKER_REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7-alpine}
    container_name: talentflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_redis}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp-server:
    build: *backend-build
    container_name: talentflow-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_SERVER: mysql
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8002
    command: ["python", "mcp_server/server.py"]
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MCP_PUBLISH_PORT:-8002}:8002"
    volumes:
      - backend_uploads:/app/uploads

  backend:
    build: *backend-build
    container_name: talentflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_SERVER: mysql
      REDIS_HOST: redis
      MCP_SERVER_URL: http://mcp-server:8002/mcp
      CHECKPOINTER_BACKEND: sqlite
      SQLITE_CHECKPOINT_PATH: /app/data/langgraph_checkpoints.sqlite
      PRELOAD_MODELS_ON_STARTUP: ${PRELOAD_MODELS_ON_STARTUP:-false}
      APP_PROCESS_ROLE: api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    volumes:
      - backend_vector_store:/app/vector_store
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  celery-worker:
    build: *backend-build
    container_name: talentflow-celery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_SERVER: mysql
      REDIS_HOST: redis
      MCP_SERVER_URL: http://mcp-server:8002/mcp
      CHECKPOINTER_BACKEND: sqlite
      SQLITE_CHECKPOINT_PATH: /app/data/langgraph_checkpoints.sqlite
      APP_PROCESS_ROLE: worker
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=1",
      ]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-server:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - backend_vector_store:/app/vector_store
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./talentflow-ai-frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE: ${DOCKER_NODE_BASE:-docker.m.daocloud.io/library/node:18-alpine}
        NGINX_BASE: ${DOCKER_NGINX_BASE:-docker.m.daocloud.io/library/nginx:stable-alpine}
    container_name: talentflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PUBLISH_PORT:-8080}:80"

volumes:
  mysql_data:
  redis_data:
  backend_vector_store:
  backend_data:
  backend_uploads:
